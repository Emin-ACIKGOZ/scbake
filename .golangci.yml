# .golangci.yml - Standardized Go Linter Configuration

version: "2"
run:
  # Default timeout for linter
  timeout: 5m
  # Include test files
  tests: true

linters:
  enable:
    # --- Core & Bugs ---
    - bodyclose
    - copyloopvar
    - errcheck
    - govet
    - nilerr
    - noctx
    - reassign
    - staticcheck
    - unused

    # --- Style, Performance & Idioms ---
    - goconst
    - ineffassign
    - misspell
    - mnd
    - perfsprint
    - predeclared
    - revive
    - whitespace

    # --- Complexity & Meta ---
    - cyclop
    - nolintlint

    # --- Security ---
    - gosec

  settings:
    misspell:
      locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0